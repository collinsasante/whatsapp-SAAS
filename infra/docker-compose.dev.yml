version: '3.9'

networks:
  platform-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: wa_postgres_dev
    environment:
      POSTGRES_USER: waplatform
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: waplatform_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - platform-dev-network

  redis:
    image: redis:7-alpine
    container_name: wa_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - platform-dev-network

  minio:
    image: minio/minio:latest
    container_name: wa_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - platform-dev-network
