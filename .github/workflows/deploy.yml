name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'prisma/**'
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'

      - name: Deploy backend
        if: steps.changes.outputs.backend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /root/whatsapp-platform/infra/scripts/deploy.sh backend
          command_timeout: 15m

      - name: Deploy frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /root/whatsapp-platform/infra/scripts/deploy.sh frontend
          command_timeout: 15m

      - name: Reload nginx (infra-only changes)
        if: steps.changes.outputs.backend == 'false' && steps.changes.outputs.frontend == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/whatsapp-platform && git pull origin main
            docker exec wa_nginx nginx -t && docker exec wa_nginx nginx -s reload
          command_timeout: 2m
