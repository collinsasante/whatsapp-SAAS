name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  # ── 1. Type-check + Lint ────────────────────────────────────────────────────
  lint:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @whatsapp-platform/shared-types build
          pnpm --filter @whatsapp-platform/shared-utils build

      - name: Generate Prisma client
        run: pnpm --filter @whatsapp-platform/backend prisma:generate

      - name: Type-check backend
        run: pnpm --filter @whatsapp-platform/backend typecheck

      - name: Type-check frontend
        run: pnpm --filter @whatsapp-platform/frontend typecheck

  # ── 2. Verz AI accuracy eval ─────────────────────────────────────────────────
  # Gates every deploy on the grounded-answer accuracy bar (docs/ai-eval-report.md)
  # so a prompt/retrieval/model change can't silently regress into confidently
  # wrong answers. Requires the DEEPSEEK_API_KEY secret -- there is no mocked-model
  # fallback, since an eval of a grounded LLM pipeline that never calls the LLM
  # isn't measuring anything real. If that secret isn't set yet, this job fails
  # with a clear message rather than silently skipping.
  ai-eval:
    name: Verz AI Eval
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eval
          POSTGRES_PASSWORD: eval
          POSTGRES_DB: verz_ai_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @whatsapp-platform/shared-types build
          pnpm --filter @whatsapp-platform/shared-utils build

      - name: Generate Prisma client
        run: pnpm --filter @whatsapp-platform/backend prisma:generate

      - name: Sync eval database schema
        working-directory: apps/backend
        run: npx prisma db push --accept-data-loss --skip-generate
        env:
          DATABASE_URL: postgresql://eval:eval@localhost:5432/verz_ai_eval

      - name: Apply generated tsvector column (raw SQL -- not representable in schema.prisma)
        run: |
          PGPASSWORD=eval psql -h localhost -U eval -d verz_ai_eval -c "
            ALTER TABLE knowledge_base_chunks ADD COLUMN IF NOT EXISTS content_tsv tsvector GENERATED ALWAYS AS (to_tsvector('english', coalesce(content, ''))) STORED;
            CREATE INDEX IF NOT EXISTS knowledge_base_chunks_content_tsv_idx ON knowledge_base_chunks USING GIN (content_tsv);
          "

      - name: Run Verz AI eval
        working-directory: apps/backend
        run: pnpm run ai-eval
        env:
          DATABASE_URL: postgresql://eval:eval@localhost:5432/verz_ai_eval
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_placeholder' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_placeholder' }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY || 'sk_ci_placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          REDIS_HOST: localhost
          REDIS_PORT: '1'

  # ── 3. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [lint, ai-eval]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'apps/worker/**'
              - 'apps/realtime/**'
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
            infra:
              - 'infra/nginx/**'
              - 'infra/docker-compose.yml'

      - name: Deploy backend
        if: steps.changes.outputs.backend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /root/whatsapp-platform/infra/scripts/deploy.sh backend
          command_timeout: 15m

      - name: Deploy frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /root/whatsapp-platform/infra/scripts/deploy.sh frontend
          command_timeout: 15m

      - name: Reload nginx (infra-only changes)
        if: steps.changes.outputs.backend == 'false' && steps.changes.outputs.frontend == 'false' && steps.changes.outputs.infra == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/whatsapp-platform && git pull origin main
            docker exec wa_nginx nginx -t && docker exec wa_nginx nginx -s reload
          command_timeout: 2m

      - name: Verify production health
        run: |
          echo "Waiting 15s for containers to stabilise..."
          sleep 15
          STATUS=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused \
            https://verzchat.com/api/v1/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))")
          if [[ "$STATUS" != "ok" ]]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "Production health: $STATUS"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            curl -s -X POST https://verzchat.com/api/v1/platform-admin/alerts/deploy-failure \
              -H "X-Alert-Secret: ${PLATFORM_ADMIN_SETUP_SECRET}" \
              -d '{"commit":"${{ github.sha }}","actor":"${{ github.actor }}"}' || true
